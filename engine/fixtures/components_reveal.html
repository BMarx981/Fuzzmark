<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reveal-trigger Fixture</title>
  <style>
    body { margin: 0; padding: 32px; background: #f9fafb;
           font: 15px -apple-system, system-ui, sans-serif; color: #111; }
    section { max-width: 560px; margin: 0 auto 24px; background: white;
              padding: 18px 22px; border-radius: 8px;
              box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    button { padding: 6px 12px; font: inherit; border: 1px solid #d1d5db;
             border-radius: 4px; background: #f3f4f6; cursor: pointer; }
    label { display: block; font-weight: 600; margin-top: 12px; }
    input, textarea { display: block; width: 100%; padding: 6px 8px;
              border: 1px solid #d1d5db; border-radius: 4px;
              box-sizing: border-box; margin-top: 4px; }
  </style>
</head>
<body>

  <section>
    <h2>Always visible</h2>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required>
  </section>

  <section>
    <h2>Disclosure (aria-expanded), lazy-mounted</h2>
    <button id="toggle-billing"
            type="button"
            aria-expanded="false"
            aria-controls="billing-panel">Billing details</button>
    <div id="billing-panel"></div>
  </section>

  <section>
    <h2>Multi-step: revealing a nested disclosure, lazy-mounted</h2>
    <button id="toggle-shipping"
            type="button"
            aria-expanded="false"
            aria-controls="shipping-panel">Shipping details</button>
    <div id="shipping-panel"></div>
  </section>

  <section>
    <h2>Native &lt;details&gt;, lazy-mounted</h2>
    <details id="prefs">
      <summary>Optional preferences</summary>
    </details>
  </section>

  <section>
    <h2>Dialog opener (aria-haspopup), lazy-mounted</h2>
    <button id="open-coupon"
            type="button"
            aria-haspopup="dialog"
            aria-controls="coupon-dialog">Apply coupon</button>
    <dialog id="coupon-dialog"></dialog>
  </section>

  <section>
    <h2>Text-pattern trigger ("Add another"), lazy-mounted</h2>
    <div id="phones"></div>
    <button id="add-phone" type="button">Add another phone</button>
  </section>

  <template id="billing-fields">
    <label for="cardname">Cardholder name</label>
    <input id="cardname" name="cardname" type="text" maxlength="80" required>
    <label for="cardnumber">Card number</label>
    <input id="cardnumber" name="cardnumber" type="text" pattern="[0-9]{16}" required>
  </template>

  <template id="shipping-fields">
    <label for="address">Address</label>
    <input id="address" name="address" type="text" maxlength="120">
    <button id="toggle-international"
            type="button"
            aria-expanded="false"
            aria-controls="intl-panel">Add international fields</button>
    <div id="intl-panel"></div>
  </template>

  <template id="intl-fields">
    <label for="country">Country code</label>
    <input id="country" name="country" type="text" pattern="[A-Z]{2}" maxlength="2">
  </template>

  <template id="prefs-fields">
    <label for="referral">How did you hear about us?</label>
    <textarea id="referral" name="referral" maxlength="200"></textarea>
  </template>

  <template id="coupon-fields">
    <label for="coupon">Coupon code</label>
    <input id="coupon" name="coupon" type="text" maxlength="32">
  </template>

  <template id="phone-row">
    <label>Phone
      <input name="phone" type="tel">
    </label>
  </template>

  <script>
    const mountInto = (panelId, tmplId) => {
      const panel = document.getElementById(panelId);
      const tmpl = document.getElementById(tmplId);
      if (panel && tmpl && panel.children.length === 0) {
        panel.appendChild(tmpl.content.cloneNode(true));
      }
    };

    const wireDisclosure = (btnId, panelId, tmplId) => {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.addEventListener('click', () => {
        const open = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', open ? 'false' : 'true');
        if (!open) mountInto(panelId, tmplId);
      });
    };

    wireDisclosure('toggle-billing', 'billing-panel', 'billing-fields');
    wireDisclosure('toggle-shipping', 'shipping-panel', 'shipping-fields');
    // The intl toggle is mounted only after shipping opens, so we delegate.
    document.addEventListener('click', (ev) => {
      const t = ev.target;
      if (t && t.id === 'toggle-international') {
        const open = t.getAttribute('aria-expanded') === 'true';
        t.setAttribute('aria-expanded', open ? 'false' : 'true');
        if (!open) mountInto('intl-panel', 'intl-fields');
      }
    });

    const couponBtn = document.getElementById('open-coupon');
    if (couponBtn) {
      couponBtn.addEventListener('click', () => {
        const dlg = document.getElementById('coupon-dialog');
        if (dlg && dlg.children.length === 0) {
          const tmpl = document.getElementById('coupon-fields');
          if (tmpl) dlg.appendChild(tmpl.content.cloneNode(true));
        }
        if (dlg && !dlg.open && typeof dlg.show === 'function') dlg.show();
      });
    }

    const addPhone = document.getElementById('add-phone');
    if (addPhone) {
      addPhone.addEventListener('click', () => {
        const tmpl = document.getElementById('phone-row');
        const phones = document.getElementById('phones');
        if (tmpl && phones) {
          phones.appendChild(tmpl.content.cloneNode(true));
        }
      });
    }

    const prefs = document.getElementById('prefs');
    if (prefs) {
      prefs.addEventListener('toggle', () => {
        if (prefs.open) {
          const tmpl = document.getElementById('prefs-fields');
          if (tmpl && !prefs.querySelector('#referral')) {
            prefs.appendChild(tmpl.content.cloneNode(true));
          }
        }
      });
    }
  </script>
</body>
</html>
