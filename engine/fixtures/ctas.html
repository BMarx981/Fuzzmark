<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CTA Coverage Fixture</title>
  <style>
    body { margin: 0; padding: 32px; background: #f9fafb;
           font: 15px -apple-system, system-ui, sans-serif; color: #111; }
    section { max-width: 560px; margin: 0 auto 24px; background: white;
              padding: 18px 22px; border-radius: 8px;
              box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    button, input[type=button], input[type=submit], .role-btn, .btn {
      padding: 6px 12px; font: inherit; border: 1px solid #d1d5db;
      border-radius: 4px; background: #f3f4f6; cursor: pointer;
      margin-right: 6px; display: inline-block;
    }
    .btn-icon { display: inline-block; width: 12px; height: 12px;
                background: #6b7280; cursor: pointer; margin-right: 4px; }
    .pointer-link { cursor: pointer; color: #2563eb; }
    .decorative-hover { cursor: pointer; width: 40px; height: 8px;
                        background: #e5e7eb; display: inline-block; }
    [aria-disabled="true"], [disabled] { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <section>
    <h2>Native buttons</h2>
    <button id="btn-submit" type="submit">Send message</button>
    <button id="btn-cancel" type="button">Cancel</button>
    <button id="btn-disabled" type="button" disabled>Disabled action</button>
    <input id="input-submit" type="submit" value="Submit form">
    <input id="input-button" type="button" value="Reset filters">
  </section>

  <section>
    <h2>ARIA role=button</h2>
    <div id="role-btn-1" role="button" tabindex="0" class="role-btn">Open dialog</div>
    <div id="role-btn-2" role="button" aria-label="Close" tabindex="0" class="role-btn">×</div>
    <div id="role-btn-3" role="button" aria-disabled="true" tabindex="0" class="role-btn">Save (disabled)</div>
  </section>

  <section>
    <h2>Link CTAs</h2>
    <a id="link-pricing" href="/pricing">See pricing</a>
    &nbsp;
    <a id="link-docs" href="https://example.com/docs" target="_blank">Documentation</a>
    &nbsp;
    <a id="link-noop" href="">Anchor with empty href (skipped)</a>
    &nbsp;
    <a id="link-anchorless">Anchor without href (skipped)</a>
  </section>

  <section>
    <h2>Accessible-name fallbacks</h2>
    <span id="lbl-purchase">Purchase</span>
    <button id="btn-labelledby" aria-labelledby="lbl-purchase"></button>
    <button id="btn-title" title="Settings"></button>
  </section>

  <section>
    <h2>Non-semantic clickables (heuristic)</h2>
    <div id="div-onclick" class="btn" onclick="void(0)">Save changes</div>
    <span id="span-pointer" class="pointer-link">Toggle theme</span>
    <div id="wrapper-onclick" class="btn" onclick="void(0)">
      <span id="wrapper-onclick-icon" class="btn-icon"></span>
      <span id="wrapper-onclick-label">Open menu</span>
    </div>
    <div id="decorative" class="decorative-hover"></div>
  </section>

</body>
</html>
