<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Fixture Form</title></head>
<body>
  <form>
    <label for="email">Email address</label>
    <input id="email" name="email" type="email" required maxlength="120">

    <label>Full name
      <input name="fullname" type="text" minlength="2" maxlength="80">
    </label>

    <input name="zip" type="text" pattern="[0-9]{5}" aria-label="ZIP code" required>

    <input name="age" type="number" min="16" max="120" step="1">

    <label for="state">State</label>
    <select id="state" name="state">
      <option value="">Choose</option>
      <option value="DE">Delaware</option>
      <option value="MD">Maryland</option>
    </select>

    <label for="msg">Message</label>
    <textarea id="msg" name="message" maxlength="500" placeholder="Tell us more"></textarea>

    <input type="hidden" name="csrf" value="xyz">
    <button type="submit">Send</button>
  </form>
</body>
</html>
